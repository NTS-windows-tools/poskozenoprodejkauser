<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodejka poškozených CD a DVD</title>
    <style>
        :root { --primary: #2196F3; --success: #4CAF50; --danger: #f44336; --gray: #9e9e9e; --bg: #f9f9f9; --text: #333; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }
        h1, h3 { margin-top: 0; text-align: center; }
        hr { border: 0; height: 1px; background: #eee; margin: 15px 0; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-disabled { background: var(--gray); color: white; cursor: not-allowed; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; padding: 15px; box-sizing: border-box; z-index: 100; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; position: relative; }
        .close-btn { position: absolute; right: 15px; top: 15px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray); }
        
        /* Product Cards */
        .product-card { border: 2px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .product-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .product-info { font-size: 14px; margin-bottom: 5px; }
        .sold-out { color: var(--danger); font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        
        /* Order Controls */
        .counter-wrap { display: flex; align-items: center; gap: 10px; margin: 15px 0; }
        .counter-btn { width: 40px; height: 40px; font-size: 20px; border: 1px solid #ccc; background: #eee; border-radius: 6px; cursor: pointer; }
        .counter-input { width: 60px; height: 40px; text-align: center; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
        .warning-text { color: var(--danger); font-size: 13px; margin-bottom: 15px; display: none; }
        .total-price { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        
        /* Toast */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold; display: none; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="toast" class="toast">✔️ Úspěšně objednáno!</div>

<div class="container">
    <h1>Prodejka poškozených CD a DVD</h1>
    <hr>
    <p>Zpravidla jde o praskliny v obalu, škrábance apod - vždy se podívat na foto.</p>
    <hr>
    <div id="products-list">Načítání nabídek...</div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">✖</button>
        <h3 id="modal-title">Objednat: </h3>
        
        <div id="single-item-text" style="display:none; font-weight: bold; margin-bottom: 15px;">
            Objednává se 1 ks, více není k dispozici
        </div>
        
        <div id="multi-item-wrap" style="display:none;">
            <label style="font-weight:bold;">Počet kusů:</label>
            <div class="counter-wrap">
                <button class="counter-btn" onclick="changeCount(-1)">-</button>
                <input type="text" id="order-count" class="counter-input" value="1" inputmode="numeric">
                <button class="counter-btn" onclick="changeCount(1)">+</button>
            </div>
            <div id="max-warning" class="warning-text">Je k dispozici maximálně XYZ ks</div>
        </div>

        <div class="total-price" id="total-price-text">Celková cena: 0 Kč</div>
        <button class="btn btn-green" id="btn-confirm-order">Potvrdit objednávku</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDEqyErJsIke5vXEnlwWHfqhGOP46rpLRo",
        authDomain: "prodejkaposkozene.firebaseapp.com",
        databaseURL: "https://prodejkaposkozene-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "prodejkaposkozene",
        storageBucket: "prodejkaposkozene.firebasestorage.app",
        messagingSenderId: "31728433079",
        appId: "1:31728433079:web:844d71c30d1dde91df5a32"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const productsRef = ref(db, 'products');

    let currentOrder = { id: null, maxKs: 0, cena: 0 };
    const countInput = document.getElementById('order-count');
    const warningText = document.getElementById('max-warning');
    const priceText = document.getElementById('total-price-text');

    // Zobrazení produktů
    onValue(productsRef, (snapshot) => {
        const list = document.getElementById('products-list');
        list.innerHTML = '';
        
        if (snapshot.exists()) {
            snapshot.forEach((childSnapshot) => {
                const id = childSnapshot.key;
                const data = childSnapshot.val();
                
                const card = document.createElement('div');
                card.className = 'product-card';
                
                let countDisplay = `<div class="product-info">Počet dostupných kusů: ${data.pocet}</div>`;
                let btnDisplay = `<button class="btn btn-blue" onclick="openOrderModal('${id}', '${data.nazev}', ${data.pocet}, ${data.cena})">Objednat</button>`;
                
                // Ošetření platného odkazu na fotku a přidání modrého odkazu
                let validLink = data.foto;
                if (validLink && !validLink.startsWith('http://') && !validLink.startsWith('https://')) {
                    validLink = 'https://' + validLink;
                }
                let fotoDisplay = data.foto ? `<div class="product-info">Foto: <a href="${validLink}" target="_blank" style="color: blue; text-decoration: underline;">ZDE</a></div>` : '';
                
                if(data.pocet <= 0) {
                    countDisplay = `<div class="sold-out">Vyprodáno</div>`;
                    btnDisplay = `<button class="btn btn-disabled" disabled>Objednat</button>`;
                }

                card.innerHTML = `
                    <div class="product-title">${data.nazev}</div>
                    ${countDisplay}
                    <div class="product-info">Cena: ${data.cena} Kč</div>
                    ${fotoDisplay}
                    ${btnDisplay}
                `;
                list.prepend(card);
            });
        } else {
            list.innerHTML = 'Žádné aktivní nabídky.';
        }
    });

    // Modal Logika
    window.openOrderModal = (id, nazev, pocet, cena) => {
        currentOrder = { id, maxKs: pocet, cena };
        document.getElementById('modal-title').innerText = `Objednat: ${nazev}`;
        
        if(pocet === 1) {
            document.getElementById('single-item-text').style.display = 'block';
            document.getElementById('multi-item-wrap').style.display = 'none';
            countInput.value = 1;
        } else {
            document.getElementById('single-item-text').style.display = 'none';
            document.getElementById('multi-item-wrap').style.display = 'block';
            countInput.value = 1;
            warningText.style.display = 'none';
        }
        
        updatePriceText();
        document.getElementById('orderModal').style.display = 'flex';
    };

    window.closeModal = () => { document.getElementById('orderModal').style.display = 'none'; };

    // Logika počítadla a validace
    const updatePriceText = () => {
        let val = parseInt(countInput.value) || 1;
        priceText.innerText = `Celková cena: ${val * currentOrder.cena} Kč`;
    };

    window.changeCount = (delta) => {
        let val = parseInt(countInput.value) || 1;
        val += delta;
        validateAndApplyCount(val);
    };

    countInput.addEventListener('input', function(e) {
        let val = this.value.replace(/[^0-9]/g, '');
        if(val === '') { this.value = ''; return; } // povolíme na chvíli prázdné pole při mazání
        validateAndApplyCount(parseInt(val));
    });

    countInput.addEventListener('blur', function() {
        if(this.value === '' || parseInt(this.value) === 0) {
            validateAndApplyCount(1);
        }
    });

    function validateAndApplyCount(val) {
        if (val > currentOrder.maxKs) {
            val = currentOrder.maxKs;
            warningText.innerText = `Je k dispozici maximálně ${currentOrder.maxKs} ks`;
            warningText.style.display = 'block';
        } else {
            warningText.style.display = 'none';
        }
        
        if (val < 1) val = 1;
        
        countInput.value = val;
        updatePriceText();
    }

    // Odeslání objednávky (pomocí Transaction pro bezpečný odpočet)
    document.getElementById('btn-confirm-order').addEventListener('click', () => {
        let requestedCount = parseInt(countInput.value) || 1;
        let totalCost = requestedCount * currentOrder.cena;
        
        const itemRef = ref(db, `products/${currentOrder.id}`);
        
        runTransaction(itemRef, (product) => {
            if (product) {
                if (product.pocet >= requestedCount) {
                    product.pocet -= requestedCount;
                    
                    // Vytvoření unikátního záznamu pro tuto konkrétní objednávku
                    if (!product.orders) {
                        product.orders = {};
                    }
                    const orderId = 'ord_' + new Date().getTime() + '_' + Math.floor(Math.random() * 10000);
                    product.orders[orderId] = { ks: requestedCount, kc: totalCost };
                    
                } else {
                    return; // Zruší transakci, pokud během kliknutí někdo jiný koupil
                }
            }
            return product;
        }).then((result) => {
            if (result.committed) {
                closeModal();
                showToast();
            } else {
                alert("Omlouváme se, tento produkt byl právě vyprodán nebo není k dispozici požadované množství.");
                closeModal();
            }
        }).catch((error) => {
            console.error(error);
            alert("Chyba při objednávce.");
        });
    });

    function showToast() {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 5000);
    }
</script>
</body>
</html>
